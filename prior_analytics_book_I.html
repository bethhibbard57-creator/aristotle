      {label:"The point", note:"A term in a syllogism can be a phrase rather than a single word — what matters is that it signifies one thing"},
      {label:"Example", note:"'That which is good' or 'that which is honourable' can serve as a term if they signify one thing consistently"},
      {label:"Constraint", note:"Whatever serves as a term must be singular in reference throughout the syllogism — the unity condition from De Int. Ch. 8 extended to terms"},
    ]
  },
  {
    id:"pa36", label:"Pr. An. I.36 — the predication relation in syllogism", greek:"κατηγορεῖσθαι", accent:"#185FA5",
    children:[
      {label:"Not all predications are the same", note:"'Man is an animal' and 'the animal is man' differ in the direction of predication — though both are true"},
      {label:"In a syllogism the direction matters", note:"The term that is wider in predication should be the predicate — the term that is narrower should be the subject"},
      {label:"Connecting to the Categories", note:"The hierarchy of being in Cat. 5 — primary being → species → genus — determines the natural direction of predication. Reversing it generates improper predication"},
    ]
  },
  {
    id:"pa37", label:"Pr. An. I.37 — different modes of predication", greek:"τρόποι κατηγορίας", accent:"#185FA5",
    children:[
      {label:"Being predicated of a subject in different senses", note:"'Is' can be used in different senses — as essential predication, as accidental, as in a definition"},
      {label:"The categories as modes of predication", note:"Each of the ten categories represents a distinct mode in which something can be predicated of a being — the Prior Analytics reconnects to the Categories here"},
      {label:"Why the mode matters", note:"Mixing modes of predication generates invalid syllogisms — the middle term must connect subject and predicate in the same mode throughout"},
    ]
  },
  {
    id:"pa38", label:"Pr. An. I.38 — additional predicate repeated in a premise", greek:"πρόσθεσις", accent:"#185FA5",
    children:[
      {label:"The situation", note:"When a premise contains an extra predicate added to the subject — 'the just pleasant man' rather than just 'man'"},
      {label:"The rule", note:"The additional predicate belongs to whatever term it is added to throughout the syllogism — it cannot be silently dropped"},
      {label:"Failing this rule", note:"Generates apparent syllogisms where the middle term silently changes — the addition must be tracked consistently"},
    ]
  },
  {
    id:"pa39", label:"Pr. An. I.39 — substitution of equivalent terms", greek:"ἀντικατάστασις", accent:"#185FA5",
    children:[
      {label:"The rule", note:"Terms that are equivalent in meaning can be substituted for each other in a syllogism without affecting validity"},
      {label:"The constraint", note:"The substitution must preserve the meaning exactly — partial synonymy or context-dependence can introduce error"},
      {label:"Practical use", note:"Allows syllogisms to be restated in clearer terms without changing their logical structure — the basis of logical paraphrase"},
    ]
  },
  {
    id:"pa40", label:"Pr. An. I.40 — 'the pleasure is the good' vs 'pleasure is good'", greek:"ἄρθρον", accent:"#185FA5",
    children:[
      {label:"The distinction", note:"'The pleasure is the good' identifies pleasure with the good — a definite, singular predication. 'Pleasure is good' predicates goodness of pleasure in general"},
      {label:"In a syllogism", note:"If the conclusion is 'the pleasure is the good' the premises must support identity, not merely predication. These are different logical relations"},
      {label:"Connection to De Interpretatione Ch. 5", note:"Unity of the proposition — 'the pleasure is the good' is a different logical form than 'pleasure is good', requiring different premisses"},
    ]
  },
  {
    id:"pa41", label:"Pr. An. I.41 — 'A belongs to all B' vs 'A belongs to all to which B belongs'", greek:"ᾧ τὸ Β", accent:"#185FA5",
    children:[
      {label:"The distinction", note:"'A belongs to all B' and 'A belongs to all that B belongs to' are not the same — the second makes A follow B's predication range"},
      {label:"Example", note:"'Animal belongs to all man' is not the same as 'animal belongs to all that man belongs to' — because man is predicated of individuals, not species"},
      {label:"Why it matters", note:"Confusing these generates invalid syllogisms where the scope of predication is tacitly shifted — a subtle form of the homonymy error"},
    ]
  },
  {
    id:"pa42", label:"Pr. An. I.42 — not all conclusions from the same premises have the same syllogism", greek:"οὐ πάντα", accent:"#185FA5",
    children:[
      {label:"The observation", note:"From the same set of premises, different conclusions may follow — and they need not all be proved by the same syllogism"},
      {label:"Implication", note:"The syllogistic is not a mechanical procedure but requires judgment about which conclusion is being targeted and which figure and mood are appropriate"},
    ]
  },
  {
    id:"pa43", label:"Pr. An. I.43 — arguments about parts of definitions", greek:"μέρη ὅρου", accent:"#185FA5",
    children:[
      {label:"When a term is part of a definition", note:"The syllogism can use either the whole definition or part of it as a term — depending on what the argument requires"},
      {label:"The constraint", note:"The part used must be predicated in the same way as the whole definition would be — partial use of a definition must not distort the predication"},
    ]
  },
  {
    id:"pa44", label:"Pr. An. I.44 — syllogism from a hypothesis", greek:"ἐξ ὑποθέσεως", accent:"#185FA5",
    children:[
      {label:"Syllogism from a hypothesis defined", note:"An argument that establishes its conclusion not directly but conditionally — if X then Y is proved, and X is conceded, therefore Y"},
      {label:"Distinction from direct syllogism", note:"In a direct syllogism the conclusion follows necessarily from the premises as stated. In a hypothetical syllogism an additional agreement or hypothesis is required"},
      {label:"The hypothesis cannot be demonstrated", note:"Whatever is established by the hypothesis is only as secure as the hypothesis itself — this is not demonstration but a weaker form of argument"},
      {label:"Connection to demonstration", note:"Posterior Analytics will distinguish: demonstration is from premises known to be true and primary. Hypothetical reasoning is dialectical — it proceeds from what is conceded"},
    ]
  },
  {
    id:"pa45", label:"Pr. An. I.45 — reduction of syllogisms across figures", greek:"μετάληψις", accent:"#185FA5",
    children:[
      {label:"The question", note:"Can every syllogism in one figure be converted into a syllogism in another figure?"},
      {label:"First to second and third", note:"Some but not all first figure syllogisms can be restated in the second or third figure — the figures are not fully interchangeable"},
      {label:"Second and third to first", note:"All second and third figure syllogisms can be reduced to first — but not all first figure syllogisms can be expressed in the second or third"},
      {label:"The asymmetry", note:"The first figure is logically more powerful — it alone can prove all four types of categorical proposition universally and particularly, affirmatively and negatively"},
    ]
  },
  {
    id:"pa46", label:"Pr. An. I.46 — 'not to be X' vs 'to be not-X'", greek:"τὸ μὴ εἶναι καὶ τὸ εἶναι μή", accent:"#BA7517",
    children:[
      {label:"The distinction restated", note:"'S is not P' (negation of the predication) is different from 'S is not-P' (affirmation of the indefinite predicate)", eg:"'Socrates is not just' vs 'Socrates is unjust'"},
      {label:"In the syllogistic", note:"'Not to be just' negates a predication. 'To be not-just' affirms an indefinite predicate. In a syllogism these must not be confused — they occupy different logical positions"},
      {label:"Connection to De Interpretatione Ch. 10", note:"The four proposition forms — S is P / S is not P / S is not-P / S is not not-P — are now carried into the syllogistic. The indefinite name does real logical work here"},
      {label:"Connection to the Categories Ch. 1", note:"Homonymy at the level of the name 'just' vs 'not-just' — the indefinite name is not the contrary but the logical complement. Conflating them is a form of improper predication"},
      {label:"Significance for paper one", note:"This chapter closes the loop: the indefinite name introduced in De Int. Ch. 2–3 and the four forms of Ch. 10 are shown here to be essential to valid syllogistic reasoning. The tetralemmic structure is operational throughout the Organon"},
    ]
  },

];

const open = {};
cats.forEach(c => open[c.id] = false);
const subOpen = {};

function nodeId(label, depth) { return (label + depth).replace(/[\s/↔→'"',\.·]/g,'_'); }

function renderLeaf(n, depth) {
  const hasKids = n.children && n.children.length;
  const id = nodeId(n.label, depth);
  if (!hasKids) {
    return `<div class="leaf">
      <span class="sub-label">${n.label}</span>
      ${n.greek ? `<span class="greek">${n.greek}</span>` : ''}
      ${n.note ? `<span class="note">— ${n.note}</span>` : ''}
      ${n.eg ? `<span class="eg">e.g. ${n.eg}</span>` : ''}
    </div>`;
  }
  if (subOpen[id] === undefined) subOpen[id] = false;
  const isOpen = subOpen[id];
  return `<div class="section">
    <div class="header-row toggle" onclick="toggleSub('${id}')">
      <span class="arrow">${isOpen ? '▾' : '▸'}</span>
      <span class="sub-label">${n.label}</span>
      ${n.greek ? `<span class="greek">${n.greek}</span>` : ''}
      ${n.note ? `<span class="note">— ${n.note}</span>` : ''}
    </div>
    ${isOpen ? `<div class="children">${n.children.map(c => renderLeaf(c, depth+1)).join('')}</div>` : ''}
  </div>`;
}

const groups = [
  { label:"I — Foundations and definitions (1–3)", ids:["pa1","pa2","pa3"] },
  { label:"II — The three figures (4–7)", ids:["pa4","pa5","pa6","pa7"] },
  { label:"III — Modal syllogisms (8–22)", ids:["pa8","pa9","pa10","pa11","pa12","pa13","pa14","pa15","pa16","pa17","pa18","pa19","pa20","pa21","pa22"] },
  { label:"IV — General properties of syllogism (23–31)", ids:["pa23","pa24","pa25","pa26","pa27","pa28","pa29","pa30","pa31"] },
  { label:"V — Methodological and diagnostic (32–46)", ids:["pa32","pa33","pa34","pa35","pa36","pa37","pa38","pa39","pa40","pa41","pa42","pa43","pa44","pa45","pa46"] },
];

function renderCat(c) {
  const isOpen = open[c.id];
  return `<div class="cat-block">
    <div class="header-row toggle cat-header" style="border-left: 3px solid ${c.accent};" onclick="toggleCat('${c.id}')">
      <span class="arrow" style="color:${c.accent}">${isOpen ? '▾' : '▸'}</span>
      <span class="cat-label">${c.label}</span>
      ${c.greek ? `<span class="greek">${c.greek}</span>` : ''}
    </div>
    ${isOpen ? `<div class="cat-body">${c.children.map(n => renderLeaf(n, 1)).join('')}</div>` : ''}
  </div>`;
}

function render() {
  const catMap = {};
  cats.forEach(c => catMap[c.id] = c);
  document.getElementById('tree').innerHTML = groups.map(g => {
    return `<div class="group-label">${g.label}</div>` +
      g.ids.map(id => renderCat(catMap[id])).join('');
  }).join('');
}

window.toggleCat = function(id) { open[id] = !open[id]; render(); }
window.toggleSub = function(id) { subOpen[id] = !subOpen[id]; render(); }

render();
</script>
