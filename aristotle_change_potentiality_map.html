<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aristotelian Corpus: Change, Potentiality, Becoming & Excluded Middle</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f1;
    --bg-surface: #f0ece3;
    --bg-card: #ebe6db;
    --bg-card-hover: #e2ddd0;
    --border: #ccc5b5;
    --border-light: #b8b0a0;
    --text-primary: #1a1812;
    --text-secondary: #5a5040;
    --text-muted: #9a8e7a;

    --kinesis: #8a5c10;
    --kinesis-dim: rgba(138,92,16,0.10);
    --kinesis-mid: rgba(138,92,16,0.22);
    --dunamis: #286040;
    --dunamis-dim: rgba(40,96,64,0.10);
    --dunamis-mid: rgba(40,96,64,0.22);
    --genesis: #8a3820;
    --genesis-dim: rgba(138,56,32,0.10);
    --genesis-mid: rgba(138,56,32,0.22);
    --energeia: #205880;
    --energeia-dim: rgba(32,88,128,0.10);
    --energeia-mid: rgba(32,88,128,0.22);
    --pragma: #602880;
    --pragma-dim: rgba(96,40,128,0.10);
    --pem: #902040;
    --pem-dim: rgba(144,32,64,0.10);
    --pem-mid: rgba(144,32,64,0.22);

    --gold: #7a5e08;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 2.4rem 2rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 1.5rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 0.2rem;
  }

  header .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--text-secondary);
    font-size: 1.05rem;
    margin-bottom: 1.2rem;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }

  .filter-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-right: 0.3rem;
    text-transform: uppercase;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.9rem;
    border-radius: 2px;
    border: 1px solid;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }

  .pill.all { border-color: var(--border-light); color: var(--text-secondary); }
  .pill.all.active, .pill.all:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--gold); }

  .pill.kinesis { border-color: var(--kinesis); color: var(--kinesis); }
  .pill.kinesis.active, .pill.kinesis:hover { background: var(--kinesis-dim); }

  .pill.dunamis { border-color: var(--dunamis); color: var(--dunamis); }
  .pill.dunamis.active, .pill.dunamis:hover { background: var(--dunamis-dim); }

  .pill.genesis { border-color: var(--genesis); color: var(--genesis); }
  .pill.genesis.active, .pill.genesis:hover { background: var(--genesis-dim); }

  .pill.energeia { border-color: var(--energeia); color: var(--energeia); }
  .pill.energeia.active, .pill.energeia:hover { background: var(--energeia-dim); }

  .pill.pem { border-color: var(--pem); color: var(--pem); }
  .pill.pem.active, .pill.pem:hover { background: var(--pem-dim); }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-kinesis { background: var(--kinesis); }
  .dot-dunamis { background: var(--dunamis); }
  .dot-genesis { background: var(--genesis); }
  .dot-energeia { background: var(--energeia); }
  .dot-pem { background: var(--pem); }

  /* ── LEGEND STRIP ── */
  .legend {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0.9rem 2rem 0;
    display: flex;
    gap: 1.8rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .legend-swatch {
    width: 10px; height: 10px; border-radius: 1px;
    flex-shrink: 0;
  }

  .legend-greek {
    font-style: italic;
    color: var(--text-primary);
    font-size: 0.9rem;
  }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* ── CORPUS SECTION ── */
  .corpus-section {
    margin-bottom: 3rem;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.2rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .section-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── WORK BLOCK ── */
  .work-block {
    margin-bottom: 1.5rem;
  }

  .work-title-row {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    user-select: none;
  }

  .work-en {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--text-primary);
  }

  .work-gr {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .work-toggle {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }

  .work-title-row:hover .work-toggle { color: var(--gold); }

  /* ── PASSAGE TABLE ── */
  .passages {
    display: grid;
    gap: 0.4rem;
  }

  .passage {
    display: grid;
    grid-template-columns: 160px 1fr auto;
    gap: 0.8rem 1.2rem;
    align-items: start;
    padding: 0.7rem 1rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: all 0.2s;
    position: relative;
  }

  .passage:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-light);
  }

  .passage.hidden { display: none; }

  /* border-left colors by primary concept */
  .passage[data-primary="kinesis"] { border-left-color: var(--kinesis); }
  .passage[data-primary="dunamis"] { border-left-color: var(--dunamis); }
  .passage[data-primary="genesis"] { border-left-color: var(--genesis); }
  .passage[data-primary="energeia"] { border-left-color: var(--energeia); }
  .passage[data-primary="pem"] { border-left-color: var(--pem); }

  .passage-ref {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    padding-top: 0.15rem;
    line-height: 1.4;
  }

  .passage-ref .bekker {
    display: block;
    color: var(--gold);
    font-size: 0.68rem;
    margin-top: 0.1rem;
    opacity: 0.8;
  }

  .passage-content {}

  .passage-greek {
    font-style: italic;
    color: var(--text-secondary);
    font-size: 0.88rem;
    margin-bottom: 0.25rem;
  }

  .passage-desc {
    font-size: 0.9rem;
    color: var(--text-primary);
    line-height: 1.5;
  }

  .passage-desc .hl {
    font-style: italic;
  }

  .passage-tags {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    align-items: flex-end;
    padding-top: 0.1rem;
  }

  .tag {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    padding: 0.15rem 0.5rem;
    border-radius: 1px;
    white-space: nowrap;
  }

  .tag.kinesis { background: var(--kinesis-dim); color: var(--kinesis); border: 1px solid rgba(201,149,42,0.3); }
  .tag.dunamis { background: var(--dunamis-dim); color: var(--dunamis); border: 1px solid rgba(107,158,120,0.3); }
  .tag.genesis { background: var(--genesis-dim); color: var(--genesis); border: 1px solid rgba(184,109,74,0.3); }
  .tag.energeia { background: var(--energeia-dim); color: var(--energeia); border: 1px solid rgba(122,143,181,0.3); }
  .tag.pem { background: var(--pem-dim); color: var(--pem); border: 1px solid rgba(196,106,138,0.3); }

  /* ── COLLAPSED ── */
  .work-body.collapsed .passages {
    display: none;
  }

  /* ── PINNACLE BADGE ── */
  .pinnacle {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    border: 1px solid rgba(212,168,67,0.3);
    padding: 0.1rem 0.5rem;
    border-radius: 1px;
    margin-left: 0.5rem;
    vertical-align: middle;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    max-width: 1400px;
    margin: 0 auto 1rem;
    padding: 0 2rem;
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    font-size: 0.8rem;
  }

  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .stat-label {
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    .passage {
      grid-template-columns: 1fr;
    }
    .passage-tags { flex-direction: row; align-items: flex-start; }
  }

  /* ── SECTION COLLAPSED STATE ── */
  .section-header { cursor: pointer; }
  .section-header:hover .section-title { color: var(--gold); }

  /* Search */
  .search-wrap {
    margin-left: auto;
  }

  .search-input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'EB Garamond', serif;
    font-size: 0.9rem;
    padding: 0.3rem 0.8rem;
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-muted); }

  /* scroll */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>ARISTOTELIAN CORPUS</h1>
    <div class="subtitle">Change &middot; Potentiality &middot; Becoming &middot; Actuality &middot; Excluded Middle &mdash; A Complete Locus Map</div>
    <div class="filter-bar">
      <span class="filter-label">Filter</span>
      <button class="pill all active" onclick="setFilter('all')">All Loci</button>
      <button class="pill kinesis" onclick="setFilter('kinesis')">
        <span class="dot dot-kinesis"></span>κίνησις / μεταβολή — Change
      </button>
      <button class="pill dunamis" onclick="setFilter('dunamis')">
        <span class="dot dot-dunamis"></span>δύναμις — Potentiality
      </button>
      <button class="pill genesis" onclick="setFilter('genesis')">
        <span class="dot dot-genesis"></span>γένεσις / φθορά — Becoming
      </button>
      <button class="pill energeia" onclick="setFilter('energeia')">
        <span class="dot dot-energeia"></span>ἐνέργεια / ἐντελέχεια — Actuality
      </button>
      <button class="pill pem" onclick="setFilter('pem')">
        <span class="dot dot-pem"></span>PEM — ἢ φάναι ἢ ἀποφάναι
      </button>
      <div class="search-wrap">
        <input class="search-input" type="text" placeholder="Search passages…" oninput="doSearch(this.value)">
      </div>
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">passages</span></div>
  <div class="stat"><span class="stat-num" id="stat-works">0</span><span class="stat-label">works</span></div>
  <div class="stat"><span class="stat-num" id="stat-visible">0</span><span class="stat-label">visible</span></div>
</div>

<main id="main-content">
<!-- Dynamically rendered -->
</main>

<script>
const CONCEPTS = {
  kinesis:  { label: 'κίνησις',   color: '#c9952a', en: 'Change / Motion' },
  dunamis:  { label: 'δύναμις',   color: '#6b9e78', en: 'Potentiality / Power' },
  genesis:  { label: 'γένεσις',   color: '#b86d4a', en: 'Becoming / Perishing' },
  energeia: { label: 'ἐνέργεια',  color: '#7a8fb5', en: 'Actuality / Fulfilment' },
  pem:      { label: 'PEM',        color: '#c46a8a', en: 'Excluded Middle / Bivalence' },
};

// ── CORPUS DATA ───────────────────────────────────────────────────────────────
const CORPUS = [
  {
    section: 'ORGANON',
    works: [
      {
        en: 'Categories',
        gr: 'Κατηγορίαι',
        ghSlug: 'categories',
        passages: [
          {
            ref: 'Cat. 8',
            bekker: '8b25–9a13',
            primary: 'dunamis',
            tags: ['dunamis'],
            greek: 'δύναμις ἢ ἀδυναμία',
            desc: 'Capacity (δύναμις) listed as a sub-species of quality — the first canonical appearance of potentiality in the corpus. A thing is said to be capable (δυνατόν) by virtue of a power inhering in it.',
          },
          {
            ref: 'Cat. 8',
            bekker: '9a14–27',
            primary: 'kinesis',
            tags: ['kinesis'],
            greek: 'πάσχειν, ποιεῖν',
            desc: 'Being-affected (πάσχειν) and doing (ποιεῖν) treated as quasi-categories — the categorical furniture for later analysis of active/passive change.',
          },
          {
            ref: 'Cat. 14',
            bekker: '15a13–15b17',
            primary: 'kinesis',
            tags: ['kinesis', 'genesis'],
            greek: 'μεταβολή',
            desc: 'The six species of change (μεταβολή) treated as post-predicaments: generation (γένεσις), destruction (φθορά), increase (αὔξησις), decrease (μείωσις), alteration (ἀλλοίωσις), change of place (φορά). First systematic taxonomy of change in the corpus.',
          },
          {
            ref: 'Cat. 10',
            bekker: '11b15–13b35',
            primary: 'pem',
            tags: ['pem'],
            greek: 'τέσσαρα εἴδη τῶν ἀντικειμένων',
            desc: 'The four kinds of opposition: correlatives (πρός τι), contraries (ἐναντία), privation/possession (στέρησις/ἕξις), and contradiction (ἀντίφασις). PEM holds strictly only for the fourth kind. Contraries admit of intermediates (e.g. grey between white and black); contradictories do not. This is the categorical foundation for Beth\'s thesis that what appears as contradiction in Aristotle is actually contrary opposition — the four-fold grid of opposition maps directly onto the catuṣkoṭi.',
            pinnacle: true,
          },
          {
            ref: 'Cat. 5',
            bekker: '4a10–21',
            primary: 'kinesis',
            tags: ['kinesis', 'dunamis'],
            greek: 'ὑποκείμενον',
            desc: 'Primary being as the subject that persists through change — being\'s defining feature is admitting of contrary properties at different times while remaining numerically one.',
          },
        ]
      },
      {
        en: 'De Interpretatione',
        gr: 'Περὶ ἑρμηνείας',
        ghSlug: 'de-interpretatione',
        passages: [
          {
            ref: 'DI 1–4',
            bekker: '16a1–17a7',
            primary: 'pem',
            tags: ['pem'],
            greek: 'ὄνομα, ῥῆμα, λόγος ἀποφαντικός',
            desc: 'The semantic preconditions for PEM: only the ἀποφαντικὸς λόγος (declarative sentence) is the kind of utterance to which truth or falsity — and therefore PEM — applies. Names (ὀνόματα) and verbs (ῥήματα) alone are neither true nor false. The verb is defined as σημαίνει χρόνον — it signifies time. This is the rhema/copula/temporal-index analysis that Beth has been developing: stripping the temporal index from the verb generates apparent contradictions because the apophantic form is destroyed.',
            pinnacle: true,
          },
          {
            ref: 'DI 6–7',
            bekker: '17a26–17b26',
            primary: 'pem',
            tags: ['pem'],
            greek: 'ἀντίφασις, ἀντίκειται',
            desc: 'Every affirmation (κατάφασις) has exactly one contradictory negation (ἀπόφασις) — they are opposed as contradictories (ἀντίφασις), not as contraries (ἐναντία). For every declarative sentence and its negation, one must be true and the other false. The most direct statement of bivalence in the corpus, immediately before the sea-battle.',
            pinnacle: true,
          },
          {
            ref: 'DI 9',
            bekker: '18a28–19b4',
            primary: 'pem',
            tags: ['pem', 'dunamis', 'kinesis'],
            greek: 'ἐνδέχεσθαι, ἀναγκαῖον',
            desc: 'The sea-battle: Aristotle\'s most famous challenge to PEM. Future contingent statements (ναυμαχία ἔσται αὔριον) lack determinate truth-values before the event — PEM is suspended (or restricted) for future contingents. This is the single most important PEM passage for Beth\'s project: the pragma/ousia node where logic, potentiality, and becoming converge. Priest\'s dialetheism and the catuṣkoṭi\'s "both" and "neither" positions both illuminate this passage.',
            pinnacle: true,
          },
          {
            ref: 'DI 11',
            bekker: '20b12–21b9',
            primary: 'pem',
            tags: ['pem'],
            greek: 'ἓν κατηγορεῖν, ἁπλῆ κατάφασις',
            desc: 'A simple affirmation (ἁπλῆ κατάφασις) predicates one thing of one thing. When two predicates are accidentally yoked together (e.g. "the white man is musical"), the result is not one statement and PEM does not apply to it as a unit. Improper compound predication undermines the bipolarity that PEM requires — this is the logical mechanism of Beth\'s improper-predication thesis stated in Aristotle\'s own terms.',
            pinnacle: true,
          },
          {
            ref: 'DI 12–13',
            bekker: '21b10–23a26',
            primary: 'dunamis',
            tags: ['dunamis'],
            greek: 'δυνατόν, ἐνδεχόμενον',
            desc: 'Exhaustive analysis of modal terms: possible (δυνατόν), impossible, necessary, contingent. The square of modal opposition. Potentiality enters logical space formally here.',
          },
        ]
      },
      {
        en: 'Prior Analytics',
        gr: 'Ἀναλυτικὰ Πρότερα',
        ghSlug: 'prior-analytics',
        passages: [
          {
            ref: 'APr. I.8–22',
            bekker: '29b29–40b16',
            primary: 'dunamis',
            tags: ['dunamis'],
            greek: 'τὸ ἐνδεχόμενον',
            desc: 'Modal syllogistic: syllogisms with contingent (ἐνδεχόμενον) premises. Potentiality enters formal inference. The notorious difficulties here (including non-transitivity of contingency) prefigure the four-valued logic Beth is working with.',
          },
          {
            ref: 'APr. I.46',
            bekker: '51b36–52b34',
            primary: 'pem',
            tags: ['pem'],
            greek: 'τὸ οὐκ εἶναι, τὸ μὴ εἶναι',
            desc: 'Critical distinction: "not-being-F" (οὐκ εἶναι) vs. "being not-F" (εἶναι μὴ) are not the same. The infinite or indefinite predicate (μὴ ἄνθρωπος) is not a negation that generates a proper contradictory pair. PEM applies only to finite contradictories, not to infinite-predicate constructions — a locus for Beth\'s improper-predication thesis meeting the excluded middle.',
          },
        ]
      },
      {
        en: 'Posterior Analytics',
        gr: 'Ἀναλυτικὰ Ὕστερα',
        ghSlug: 'posterior-analytics',
        passages: [
          {
            ref: 'APo. I.11',
            bekker: '77a10–77b15',
            primary: 'pem',
            tags: ['pem'],
            greek: 'κοινὰ ἀξιώματα',
            desc: 'PNC and PEM as common axioms (κοινὰ ἀξιώματα) that every demonstrative science presupposes but does not prove. They are not premises of demonstrations but the condition of the possibility of all demonstration. Sciences use them (χρῶνται) without thematising them — thematising them is the job of first philosophy (Metaphysics Γ). The structural role of PEM in the architecture of the Organon.',
          },
          {
            ref: 'APo. II.12',
            bekker: '95a10–b1',
            primary: 'kinesis',
            tags: ['kinesis', 'genesis'],
            greek: 'τὸ γίγνεσθαι',
            desc: 'Demonstration applied to processes of becoming (γίγνεσθαι): the middle term of a syllogism explaining becoming must itself refer to something in the process of becoming. Temporal structure enters the demonstrative syllogism.',
          },
          {
            ref: 'APo. II.19',
            bekker: '99b15–100b17',
            primary: 'dunamis',
            tags: ['dunamis', 'energeia'],
            greek: 'νοῦς',
            desc: 'Nous as the faculty that grasps first principles — characterised as a potentiality (δύναμις) actualised through experience. The epistemological arc from potential to actual knowledge mirrors the ontological arc in Metaphysics Θ.',
          },
        ]
      },

// ── FILTER STATE ──────────────────────────────────────────────────────────────
let activeFilter = 'all';
let searchTerm = '';

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.classList.contains(f) || (f === 'all' && p.classList.contains('all')));
  });
  applyVisibility();
}

function doSearch(val) {
  searchTerm = val.toLowerCase().trim();
  applyVisibility();
}

function applyVisibility() {
  let visible = 0;
  document.querySelectorAll('.passage').forEach(el => {
    const tags = el.dataset.tags.split(',');
    const matchFilter = activeFilter === 'all' || tags.includes(activeFilter);
    const text = el.textContent.toLowerCase();
    const matchSearch = !searchTerm || text.includes(searchTerm);
    const show = matchFilter && matchSearch;
    el.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('stat-visible').textContent = visible;

  // hide works with no visible passages
  document.querySelectorAll('.work-block').forEach(wb => {
    const any = [...wb.querySelectorAll('.passage')].some(p => !p.classList.contains('hidden'));
    wb.style.display = any ? '' : 'none';
  });

  // hide sections with no visible works
  document.querySelectorAll('.corpus-section').forEach(cs => {
    const any = [...cs.querySelectorAll('.work-block')].some(wb => wb.style.display !== 'none');
    cs.style.display = any ? '' : 'none';
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderCorpus() {
  const main = document.getElementById('main-content');
  let totalPassages = 0;
  let totalWorks = 0;

  CORPUS.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'corpus-section';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span class="section-title">${section.section}</span><span class="section-count">${section.works.length} works</span>`;
    hdr.onclick = () => {
      sec.querySelectorAll('.work-body').forEach(wb => wb.classList.toggle('collapsed'));
    };
    sec.appendChild(hdr);

    section.works.forEach(work => {
      totalWorks++;
      const wb = document.createElement('div');
      wb.className = 'work-block';

      const titleRow = document.createElement('div');
      titleRow.className = 'work-title-row';
      const ghLink = work.ghSlug
        ? `href="https://bethhibbard57-creator.github.io/aristotle/${work.ghSlug}.html" target="_blank"`
        : '';
      titleRow.innerHTML = `
        <span class="work-en">${ghLink ? `<a style="color:inherit;text-decoration:none;" ${ghLink}>${work.en}</a>` : work.en}</span>
        <span class="work-gr">${work.gr}</span>
        ${work.pinnacle ? '<span class="pinnacle">★ CENTRAL</span>' : ''}
        <span class="work-toggle">▾</span>
      `;

      const body = document.createElement('div');
      body.className = 'work-body';

      const passages = document.createElement('div');
      passages.className = 'passages';

      work.passages.forEach(p => {
        totalPassages++;
        const pEl = document.createElement('div');
        pEl.className = 'passage';
        pEl.dataset.primary = p.primary;
        pEl.dataset.tags = p.tags.join(',');

        const tagsHtml = p.tags.map(t =>
          `<span class="tag ${t}">${CONCEPTS[t].label}</span>`
        ).join('');

        pEl.innerHTML = `
          <div class="passage-ref">
            ${p.ref}${p.pinnacle ? ' <span style="color:var(--gold);font-size:0.8em;">★</span>' : ''}
            <span class="bekker">${p.bekker}</span>
          </div>
          <div class="passage-content">
            <div class="passage-greek">${p.greek}</div>
            <div class="passage-desc">${p.desc}</div>
          </div>
          <div class="passage-tags">${tagsHtml}</div>
        `;
        passages.appendChild(pEl);
      });

      body.appendChild(passages);
      wb.appendChild(titleRow);
      wb.appendChild(body);

      titleRow.addEventListener('click', () => {
        body.classList.toggle('collapsed');
        titleRow.querySelector('.work-toggle').textContent =
          body.classList.contains('collapsed') ? '▸' : '▾';
      });

      sec.appendChild(wb);
    });

    main.appendChild(sec);
  });

  document.getElementById('stat-total').textContent = totalPassages;
  document.getElementById('stat-works').textContent = totalWorks;
  document.getElementById('stat-visible').textContent = totalPassages;
}

renderCorpus();
