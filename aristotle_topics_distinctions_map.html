<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topics: Where the Distinctions Are Drawn</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg-surface: #111318;
    --bg-card: #171a20;
    --bg-card-hover: #1f2330;
    --border: #252933;
    --border-light: #343a4a;
    --text-primary: #d8dce8;
    --text-secondary: #7e88a0;
    --text-muted: #4a5266;
    --gold: #b89a3e;
    --gold-bright: #d4b44a;

    /* The four kinds */
    --ant: #c45575;   /* antiphasis — rose */
    --ant-dim: rgba(196,85,117,0.10);
    --ena: #c4943a;   /* enantia — amber */
    --ena-dim: rgba(196,148,58,0.10);
    --ste: #5a9e6e;   /* steresis — sage */
    --ste-dim: rgba(90,158,110,0.10);
    --pro: #5e8ab8;   /* pros-ti — slate */
    --pro-dim: rgba(94,138,184,0.10);
    --gen: #8a70b8;   /* general/all — violet */
    --gen-dim: rgba(138,112,184,0.10);

    /* Distinction pairs — for the "bridge" badges */
    --d-ant-ena: linear-gradient(90deg, var(--ant), var(--ena));
    --d-ena-ste: linear-gradient(90deg, var(--ena), var(--ste));
    --d-ste-ant: linear-gradient(90deg, var(--ste), var(--ant));
    --d-pro-all: linear-gradient(90deg, var(--pro), var(--gen));
    --d-ant-all: linear-gradient(90deg, var(--ant), var(--gen));
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner { max-width: 1380px; margin: 0 auto; }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.35rem;
    letter-spacing: 0.14em;
    color: var(--gold-bright);
    margin-bottom: 0.1rem;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--text-secondary);
    font-size: 1rem;
    margin-bottom: 1rem;
  }

  /* ── DISTINCTION KEY ── */
  .dist-key {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0.8rem 0;
    border-top: 1px solid var(--border);
  }

  .dist-key-label {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    align-self: center;
    margin-right: 0.2rem;
  }

  .dk-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.28rem 0.7rem;
    border: 1px solid var(--border-light);
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.07em;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.18s;
    border-radius: 1px;
  }

  .dk-pill:hover { color: var(--text-primary); border-color: var(--gold); background: rgba(180,160,60,0.06); }
  .dk-pill.active { color: var(--gold-bright); border-color: var(--gold-bright); background: rgba(180,160,60,0.10); }

  .dk-swatch {
    width: 18px; height: 3px; border-radius: 1px; flex-shrink: 0;
  }

  .search-input {
    margin-left: auto;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'EB Garamond', serif;
    font-size: 0.88rem;
    padding: 0.26rem 0.75rem;
    outline: none;
    width: 190px;
    transition: border-color 0.18s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-muted); }

  /* ── STATS ── */
  .stats-bar {
    max-width: 1380px; margin: 0 auto;
    padding: 0.5rem 2rem 0;
    display: flex; gap: 2rem; flex-wrap: wrap;
  }
  .stat { display: flex; align-items: baseline; gap: 0.35rem; font-size: 0.78rem; }
  .stat-num { font-family: 'Cinzel', serif; font-size: 1.05rem; color: var(--gold-bright); }
  .stat-label { color: var(--text-muted); font-style: italic; }

  /* ── MAIN ── */
  main { max-width: 1380px; margin: 0 auto; padding: 1.4rem 2rem 3rem; }

  /* ── BOOK BLOCK ── */
  .book-block { margin-bottom: 2.8rem; }

  .book-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1rem;
    padding: 0.7rem 1rem 0.7rem 1.2rem;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    cursor: pointer;
    user-select: none;
    transition: background 0.18s;
  }

  .book-header:hover { background: var(--bg-card); }

  .book-num {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .book-en {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--text-primary);
  }

  .book-theme {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-secondary);
    font-size: 0.88rem;
  }

  .book-toggle {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 0.7rem;
    font-family: 'Cinzel', serif;
  }

  .book-body.collapsed .passages { display: none; }

  /* ── BOOK OVERVIEW ── */
  .book-overview {
    padding: 0.6rem 1rem 0.8rem 1rem;
    margin-bottom: 0.7rem;
    border-left: 2px solid var(--border-light);
    font-size: 0.88rem;
    color: var(--text-secondary);
    font-style: italic;
    line-height: 1.55;
  }

  /* ── PASSAGES ── */
  .passages { display: grid; gap: 0.35rem; }

  .passage {
    display: grid;
    grid-template-columns: 148px 1fr auto;
    gap: 0.6rem 1rem;
    align-items: start;
    padding: 0.65rem 0.9rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: all 0.16s;
  }

  .passage:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
  .passage.hidden { display: none; }

  /* primary kind border */
  .passage[data-primary="antiphasis"] { border-left-color: var(--ant); }
  .passage[data-primary="enantia"]    { border-left-color: var(--ena); }
  .passage[data-primary="steresis"]   { border-left-color: var(--ste); }
  .passage[data-primary="pros-ti"]    { border-left-color: var(--pro); }
  .passage[data-primary="general"]    { border-left-color: var(--gen); }

  .passage-ref {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    line-height: 1.4;
    padding-top: 0.1rem;
  }

  .bekker {
    display: block;
    color: var(--gold);
    font-size: 0.62rem;
    margin-top: 0.08rem;
    opacity: 0.72;
  }

  .passage-greek {
    font-style: italic;
    color: var(--text-secondary);
    font-size: 0.86rem;
    margin-bottom: 0.2rem;
  }

  .passage-desc {
    font-size: 0.9rem;
    line-height: 1.52;
    color: var(--text-primary);
  }

  /* ── DISTINCTION BADGE ── */
  .dist-badges {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    align-items: flex-end;
    padding-top: 0.05rem;
  }

  .dist-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.22rem;
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.07em;
    padding: 0.12rem 0.42rem;
    border-radius: 1px;
    white-space: nowrap;
  }

  .dist-badge.antiphasis { background: var(--ant-dim); color: var(--ant); border: 1px solid rgba(196,85,117,0.28); }
  .dist-badge.enantia    { background: var(--ena-dim); color: var(--ena); border: 1px solid rgba(196,148,58,0.28); }
  .dist-badge.steresis   { background: var(--ste-dim); color: var(--ste); border: 1px solid rgba(90,158,110,0.28); }
  .dist-badge.pros-ti    { background: var(--pro-dim); color: var(--pro); border: 1px solid rgba(94,138,184,0.28); }
  .dist-badge.general    { background: var(--gen-dim); color: var(--gen); border: 1px solid rgba(138,112,184,0.28); }

  /* ── DISTINCTION TYPE MARKER ── */
  .dist-type {
    font-family: 'Cinzel', serif;
    font-size: 0.48rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 0.08rem 0.4rem;
    border: 1px solid var(--border);
    border-radius: 1px;
    white-space: nowrap;
    align-self: flex-end;
  }

  .dist-type.ENUM   { border-color: rgba(180,160,60,0.3); color: var(--gold); }
  .dist-type.BOUND  { border-color: rgba(196,85,117,0.3); color: var(--ant); }
  .dist-type.REFINE { border-color: rgba(90,158,110,0.3); color: var(--ste); }
  .dist-type.INFER  { border-color: rgba(94,138,184,0.3); color: var(--pro); }
  .dist-type.APPLY  { border-color: rgba(138,112,184,0.3); color: var(--gen); }

  /* highlight key phrases */
  .kw {
    font-style: italic;
    color: var(--text-primary);
  }

  .star { color: var(--gold); }

  @media (max-width: 780px) {
    .passage { grid-template-columns: 1fr; }
    .dist-badges { flex-direction: row; align-items: flex-start; flex-wrap: wrap; }
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>TOPICA &mdash; THE FOUR KINDS OF OPPOSITION</h1>
    <div class="subtitle">Book by book: where the distinctions are drawn, marked, and refined</div>

    <div class="dist-key">
      <span class="dist-key-label">Kind</span>
      <button class="dk-pill active" onclick="setFilter('all')">All</button>
      <button class="dk-pill" onclick="setFilter('antiphasis')">
        <span class="dk-swatch" style="background:var(--ant)"></span>\u1f00\u03bd\u03c4\u03af\u03c6\u03b1\u03c3\u03b9\u03c2 Contradiction
      </button>
      <button class="dk-pill" onclick="setFilter('enantia')">
        <span class="dk-swatch" style="background:var(--ena)"></span>\u1f10\u03bd\u03b1\u03bd\u03c4\u03af\u03b1 Contrary
      </button>
      <button class="dk-pill" onclick="setFilter('steresis')">
        <span class="dk-swatch" style="background:var(--ste)"></span>\u03c3\u03c4\u03ad\u03c1\u03b7\u03c3\u03b9\u03c2 Privation
      </button>
      <button class="dk-pill" onclick="setFilter('pros-ti')">
        <span class="dk-swatch" style="background:var(--pro)"></span>\u03c0\u03c1\u03cc\u03c2 \u03c4\u03b9 Relative
      </button>
      <button class="dk-pill" onclick="setFilter('general')">
        <span class="dk-swatch" style="background:var(--gen)"></span>General / All four
      </button>

      <span class="dist-key-label" style="margin-left:0.8rem">Marker type</span>
      <button class="dk-pill" onclick="setFilterType('ENUM')"><span style="color:var(--gold)">ENUM</span>&nbsp;Enumeration</button>
      <button class="dk-pill" onclick="setFilterType('BOUND')"><span style="color:var(--ant)">BOUND</span>&nbsp;Boundary</button>
      <button class="dk-pill" onclick="setFilterType('REFINE')"><span style="color:var(--ste)">REFINE</span>&nbsp;Refinement</button>
      <button class="dk-pill" onclick="setFilterType('INFER')"><span style="color:var(--pro)">INFER</span>&nbsp;Inferential diff.</button>
      <button class="dk-pill" onclick="setFilterType('APPLY')"><span style="color:var(--gen)">APPLY</span>&nbsp;Applied in context</button>

      <input class="search-input" type="text" placeholder="Search passages\u2026" oninput="doSearch(this.value)">
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">passages</span></div>
  <div class="stat"><span class="stat-num" id="stat-visible">0</span><span class="stat-label">visible</span></div>
</div>

<main id="main-content"></main>

<script>
// ── DISTINCTION MARKER TYPES ────────────────────────────────────────────────
// ENUM   = explicit enumeration / listing of the four kinds
// BOUND  = Aristotle draws a boundary between two specific kinds (X is not Y)
// REFINE = a refinement or complication within one kind
// INFER  = inferential difference shown (kind X generates what kind Y cannot)
// APPLY  = the distinction is applied / deployed in a specific context

const BOOKS = [
  {
    num: 'BOOK I',
    en: 'Instruments of Dialectic',
    ghSlug: 'topics',
    theme: 'The mandate: all four kinds are distinct sources for arguments',
    overview: 'Book I establishes that the four kinds of opposition are not one tool but four distinct tools, each generating arguments that the others cannot. The distinctions are drawn methodologically: by assigning each kind its own place in the inventory of argumentative resources. The crucial move is that the four are listed as parallel but non-equivalent: each has a distinct inferential role. Book I does not argue for the four-fold from scratch \u2014 it inherits it from Cat. 10 \u2014 but it immediately begins to differentiate the four by showing what each contributes to dialectical practice.',
    passages: [
      {
        ref: 'Top. I.14',
        bekker: '105a34\u2013b18',
        primary: 'general',
        tags: ['general','antiphasis','enantia','steresis','pros-ti'],
        dtype: 'ENUM',
        greek: '\u1f10\u03ba \u03c4\u1ff6\u03bd \u1f00\u03bd\u03c4\u03b9\u03ba\u03b5\u03b9\u03bc\u03ad\u03bd\u03c9\u03bd',
        pinnacle: true,
        desc: 'The four kinds are explicitly named as four distinct \u03c4\u03cc\u03c0\u03bf\u03b9-sources for arguments. Aristotle lists them as parallel but orders them: correlatives (\u03c0\u03c1\u03cc\u03c2 \u03c4\u03b9), contraries (\u1f10\u03bd\u03b1\u03bd\u03c4\u03af\u03b1), privation/possession (\u03c3\u03c4\u03ad\u03c1\u03b7\u03c3\u03b9\u03c2/\u1f15\u03be\u03b9\u03c2), contradictories (\u1f00\u03bd\u03c4\u03b9\u03c6\u03b1\u03c3\u03ba\u03ce\u03c2). The ordering is significant: pros-ti is listed first, then enantia, then steresis/hexis, then antiphasis \u2014 from the most relational to the most logically fundamental. The enumeration IS a distinction: four separate tools, not one. This is the mandate that drives all subsequent book-specific usage.',
      },
      {
        ref: 'Top. I.15',
        bekker: '106a1\u2013107b37',
        primary: 'general',
        tags: ['general','antiphasis','enantia','steresis','pros-ti'],
        dtype: 'INFER',
        greek: '\u03c4\u03b1\u1f50\u03c4\u03cc\u03bd, \u1f10\u03bd\u03b1\u03bd\u03c4\u03af\u03b1, \u03c3\u03c4\u03ad\u03c1\u03b7\u03c3\u03b9\u03c2, \u03c0\u03c1\u03cc\u03c2 \u03c4\u03b9',
        pinnacle: true,
        desc: 'Sameness-testing deploys all four kinds simultaneously and shows they are non-equivalent: the same-contrary test, the same-contradictory test, the same-privation test, and the same-correlative test each can succeed or fail independently. If good = beneficial, this is confirmed by contrary (bad = harmful), but the confirmation via correlative (the good OF what? the beneficial FOR what?) is a distinct further test. The four kinds generate four non-redundant identity-criteria. This is the sharpest implicit boundary-drawing in Book I: the tests do not collapse into each other.',
      },
      {
        ref: 'Top. I.18',
        bekker: '108a7\u2013b31',
        primary: 'general',
        tags: ['general','antiphasis','enantia','steresis','pros-ti'],
        dtype: 'ENUM',
        greek: '\u03c4\u1f70 \u1f00\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03b1, \u03c0\u03c4\u03ce\u03c3\u03b5\u03b9\u03c2',
        desc: 'The four kinds are listed again as a standard examination procedure: for any given claim, examine what holds of its contrary, its contradictory, its privation, its correlative. The repetition of the enumeration confirms that the distinction is methodologically load-bearing \u2014 it is not a one-off observation but the standard opening move. The four kinds are now habits of examination, not just logical categories.',
      },
    ]
  },

  {
    num: 'BOOK II',
    en: 'Topoi for Accidents',
    ghSlug: 'topics',
    theme: 'The sequential treatment of contraries, privations, and correlatives draws the distinctions by showing each generates what the others cannot',
    overview: 'Book II is where the distinctions become inferentially visible. Aristotle treats the three non-contradictory kinds in sequence \u2014 contraries (II.7\u20138), privations (II.9\u201310), correlatives (II.11) \u2014 and in each case shows what that kind specifically generates. The distinctions emerge from the differences in inferential yield: the contrary-topos generates symmetric inferences across the same genus; the privation-topos generates asymmetric inferences indexed to natural capacity; the correlative-topos generates inferences by substituting both relata simultaneously. Contradictories are the presupposed framework throughout, not separately treated here because their role is structural rather than topical.',
    passages: [
      {
        ref: 'Top. II.2',
        bekker: '109b13\u2013110a9',
        primary: 'enantia',
        tags: ['enantia','general'],
        dtype: 'APPLY',
        greek: '\u1f10\u03ba \u03c4\u1ff6\u03bd \u1f10\u03bd\u03b1\u03bd\u03c4\u03af\u03c9\u03bd \u03c3\u03c5\u03bc\u03b2\u03b5\u03b2\u03b7\u03ba\u03cc\u03c2',
        desc: 'The contrary-topos applied to accidents: if accident F belongs to X, the contrary of F belongs to the contrary of X. The topos works because contraries are in the same genus and the genus-structure is preserved across the contrary pair. The restriction to enantia here is the implicit boundary: this topos does NOT work for privations (the privation of F does not necessarily belong to the privation of X) or for correlatives (the correlative of F belongs to the correlative of X, but by a different mechanism). The distinctness of the three topoi is revealed by their non-substitutability.',
      },
      {
        ref: 'Top. II.7',
        bekker: '113a24\u2013114b5',
        primary: 'enantia',
        tags: ['enantia','pros-ti'],
        dtype: 'INFER',
        greek: '\u1f10\u03ba \u03c4\u1ff6\u03bd \u1f10\u03bd\u03b1\u03bd\u03c4\u03af\u03c9\u03bd',
        pinnacle: true,
        desc: 'Eight topoi from contraries. Two key distinctions are drawn here. (1) <span class="kw">Contrary vs correlative</span>: the contrary-topos applies to monadic predicates (F belongs to X, contrary-of-F to contrary-of-X); the correlative-topos requires substituting both relata simultaneously (if A is double of B, then double-of-greater-B is greater than double-of-lesser-B). The mechanisms are different in kind. (2) <span class="kw">Contrary vs contradictory</span>: the topos is stated for contraries specifically; Aristotle does not run it for contradictories because contradictories share no genus-structure that would support the symmetric inference. If X is F, the contradictory of X (non-X) has no determinate contrary-of-F \u2014 non-X is not a natural kind in a genus.',
      },
      {
        ref: 'Top. II.8',
        bekker: '114a13\u2013b5',
        primary: 'enantia',
        tags: ['enantia'],
        dtype: 'REFINE',
        greek: '\u1f10\u03ba \u03c4\u1ff6\u03bd \u1f10\u03bd\u03b1\u03bd\u03c4\u03af\u03c9\u03bd, \u03c0\u03c4\u03ce\u03c3\u03b5\u03b9\u03c2',
        desc: 'The contrary-topos is extended to all four grammatical cases (\u03c0\u03c4\u03ce\u03c3\u03b5\u03b9\u03c2): if justly (\u03b4\u03b9\u03ba\u03b1\u03af\u03c9\u03c2) is admirable, then unjustly (\u1f00\u03b4\u03af\u03ba\u03c9\u03c2) is disgraceful; if justice (nom.) is admirable, injustice (nom.) is disgraceful; if for justice (dat.) is admirable, for injustice is disgraceful. Refinement within the contrary kind: the inferential symmetry holds not just for the nominative form but across all inflections. This is a refinement of enantia, not a boundary between kinds \u2014 but it shows that the contrary-topos has an internal structure that the other kinds\u2019 topoi do not share.',
      },
      {
        ref: 'Top. II.9',
        bekker: '114b6\u2013115a14',
        primary: 'steresis',
        tags: ['steresis','enantia'],
        dtype: 'BOUND',
        greek: '\u1f10\u03ba \u03c4\u1ff6\u03bd \u03c3\u03c4\u03b5\u03c1\u03ae\u03c3\u03b5\u03c9\u03bd',
        pinnacle: true,
        desc: '<span class="kw">Steresis vs enantia</span> \u2014 the sharpest boundary drawn in Book II. The privation-topos is explicitly introduced as a new and distinct source: if sight is good, blindness is bad. Aristotle signals the transition from the contrary-topos: privation is stronger than mere contrariness (\u03bc\u1fb6\u03bb\u03bb\u03bf\u03bd \u03b4\u03b5\u03b9\u03ba\u03bd\u03cd\u03bd\u03c4\u03b5\u03c2). Why stronger? Because privation asserts a <span class="kw">natural lack</span>, not merely a contrary quality. The man who lacks sight (blindness = steresis) is not just in the contrary state to the sighted man \u2014 he is in the state of lacking what he is naturally capable of having. Blindness entails: (a) a subject capable of sight, (b) the natural time for sight has come, (c) sight is absent. None of these conditions are required for the contrary-topos. This is the functional boundary: steresis always carries a natural-norm presupposition that enantia does not.',
      },
      {
        ref: 'Top. II.10',
        bekker: '115a15\u2013b10',
        primary: 'steresis',

        desc: '<span class="kw">Enantia vs antiphasis as modes of refutation</span>: Aristotle distinguishes two kinds of erroneous response \u2014 asserting a contrary (enantia-failure: asserting a claim in the same genus that is maximally opposed to the true claim) vs. asserting a contradiction (antiphasis-failure: asserting the contradictory of a thesis one has already committed to). Only the second is a refutation in the strict sense (\u1f14\u03bb\u03b5\u03b3\u03c7\u03bf\u03c2). The first is a different kind of error: getting the genus right but hitting the wrong extreme. This boundary is philosophically important: a Heraclitean who asserts both P and not-P commits antiphasis-failure; someone who asserts P when they should assert the contrary commits enantia-failure. These are different logical errors with different diagnoses.',
      },
      {
        ref: 'Top. VIII.14',
        bekker: '163b9\u2013164a2',
        primary: 'antiphasis',
        tags: ['antiphasis','general'],
        dtype: 'BOUND',
        greek: '\u1f10\u03bb\u03b5\u03b3\u03ba\u03c4\u03b9\u03ba\u03cc\u03c2, \u1f00\u03bd\u03c4\u03af\u03c6\u03b1\u03c3\u03b9\u03c2',
        pinnacle: true,
        desc: '<span class="kw">Antiphasis as the exclusive form of refutation</span>: a genuine elenchus (\u1f14\u03bb\u03b5\u03b3\u03c7\u03bf\u03c2) consists in establishing the contradictory of the answerer\'s thesis. Not the contrary, not the privation, not the correlative \u2014 the contradictory. This is the terminal distinction of the entire Topics: after eight books of using all four kinds of opposition as argumentative tools, Aristotle establishes a strict hierarchy. The other three kinds are the means; antiphasis is the end. The elenchus is complete when and only when a contradictory has been established. This locates the Topics within the broader architecture: the Topics is ultimately a treatise about how to achieve, or defend against, antiphasis.',
      },
    ]
  },
];

// ── FILTER ────────────────────────────────────────────────────────────────────
let activeKind = 'all';
let activeType = 'all';
let searchTerm = '';

function setFilter(f) {
  activeKind = f;
  document.querySelectorAll('.dk-pill').forEach(p => {
    if (!p.dataset.type) p.classList.toggle('active', p.textContent.trim().toLowerCase().includes(f) || f === 'all');
  });
  applyVisibility();
}

function setFilterType(t) {
  activeType = activeType === t ? 'all' : t;
  document.querySelectorAll('.dk-pill[data-type]').forEach(p => p.classList.toggle('active', p.dataset.type === activeType));
  applyVisibility();
}

function doSearch(v) { searchTerm = v.toLowerCase().trim(); applyVisibility(); }

function applyVisibility() {
  let visible = 0;
  document.querySelectorAll('.passage').forEach(el => {
    const tags = el.dataset.tags.split(',');
    const matchKind = activeKind === 'all' || tags.includes(activeKind);
    const matchType = activeType === 'all' || el.dataset.dtype === activeType;
    const matchSearch = !searchTerm || el.textContent.toLowerCase().includes(searchTerm);
    const show = matchKind && matchType && matchSearch;
    el.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('stat-visible').textContent = visible;
  document.querySelectorAll('.book-block').forEach(bb => {
    bb.style.display = [...bb.querySelectorAll('.passage')].some(p => !p.classList.contains('hidden')) ? '' : 'none';
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderBooks() {
  const main = document.getElementById('main-content');
  let total = 0;

  BOOKS.forEach(book => {
    const bb = document.createElement('div');
    bb.className = 'book-block';

    // header
    const hdr = document.createElement('div');
    hdr.className = 'book-header';
    hdr.innerHTML =
      '<span class="book-num">' + book.num + '</span>' +
      '<span class="book-en">' + book.en + '</span>' +
      '<span class="book-theme">' + book.theme + '</span>' +
      '<span class="book-toggle">\u25be</span>';

    const body = document.createElement('div');
    body.className = 'book-body';

    // overview
    const ov = document.createElement('div');
    ov.className = 'book-overview';
    ov.textContent = book.overview;
    body.appendChild(ov);

    // passages
    const pContainer = document.createElement('div');
    pContainer.className = 'passages';

    book.passages.forEach(p => {
      total++;
      const el = document.createElement('div');
      el.className = 'passage';
      el.dataset.primary = p.primary;
      el.dataset.tags = p.tags.join(',');
      el.dataset.dtype = p.dtype;

      const badgesHtml = p.tags.map(t =>
        '<span class="dist-badge ' + t + '">' + t.replace('pros-ti', '\u03c0\u03c1\u03cc\u03c2 \u03c4\u03b9').replace('antiphasis', '\u1f00\u03bd\u03c4\u03af\u03c6\u03b1\u03c3\u03b9\u03c2').replace('enantia', '\u1f10\u03bd\u03b1\u03bd\u03c4\u03af\u03b1').replace('steresis', '\u03c3\u03c4\u03ad\u03c1\u03b7\u03c3\u03b9\u03c2').replace('general', '\u1f00\u03bd\u03c4\u03b9\u03ba\u03b5\u03af\u03bc\u03b5\u03bd\u03b1') + '</span>'
      ).join('') + '<span class="dist-type ' + p.dtype + '">' + p.dtype + '</span>';

      el.innerHTML =
        '<div class="passage-ref">' + p.ref + (p.pinnacle ? ' <span class="star">\u2605</span>' : '') + '<span class="bekker">' + p.bekker + '</span></div>' +
        '<div><div class="passage-greek">' + p.greek + '</div><div class="passage-desc">' + p.desc + '</div></div>' +
        '<div class="dist-badges">' + badgesHtml + '</div>';

      pContainer.appendChild(el);
    });

    body.appendChild(pContainer);
    bb.appendChild(hdr);
    bb.appendChild(body);

    hdr.addEventListener('click', () => {
      body.classList.toggle('collapsed');
      hdr.querySelector('.book-toggle').textContent = body.classList.contains('collapsed') ? '\u25b8' : '\u25be';
    });

    main.appendChild(bb);
  });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-visible').textContent = total;

  // wire up type-filter pills
  document.querySelectorAll('.dk-pill[data-type]').forEach(p => {
    // already handled
  });
}

// tag the type pills with data-type
document.querySelectorAll('.dk-pill').forEach(p => {
  const types = ['ENUM','BOUND','REFINE','INFER','APPLY'];
  types.forEach(t => { if (p.textContent.includes(t)) p.dataset.type = t; });
});

renderBooks();
</script>
